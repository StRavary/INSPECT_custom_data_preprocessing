n_gpus: 1
get_features: true
stage: classify
output_dir: outputs/wandb # use for wandb logging
test_split: test  # all
ckpt: null

lr: 0.0005
optimizer:
  name: AdamW
loss:
  loss_fn: BCEWithLogitsLoss

monitor:
  metric: val/mean_auroc
  mode: max

exp:
  base_dir: outputs # use for ckpt saving
  name: 'classify'

trainer:
  weights_summary: top
  seed: 6
  val_check_interval: 1.0
  limit_val_batches: 1.0
  precision: "bf16-mixed"  # use BF16 mixed precision for high speed and FP32-grade dynamic range (prevents NaN)
  max_epochs: 30
  gradient_clip_val: 1.0
  accumulate_grad_batches: 64
  num_workers: 4
  strategy: ddp
  position_encoding: true

defaults:
  - _self_
  - dataset: stanford_featurized
  - model: model_1d
